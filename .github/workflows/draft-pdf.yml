name: Draft PDF

on:
  push:
    branches: [main]
    paths:
      - joss/**
  pull_request:
    branches: [main]
    paths:
      - joss/**

jobs:
  paper:
    runs-on: ubuntu-latest
    name: Paper Draft
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build draft PDF
        uses: openjournals/openjournals-draft-action@master
        with:
          journal: joss
          paper-path: joss/paper.md

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: paper
          path: joss/paper.pdf
